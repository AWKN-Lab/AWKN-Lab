<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="starGrad">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes pulse { 0%,100%{r:6;opacity:0.8} 50%{r:10;opacity:1} }
      @keyframes twinkle { 0%,100%{opacity:0.3} 50%{opacity:0.8} }
      @keyframes drawLine { from{stroke-dashoffset:200} to{stroke-dashoffset:0} }
      @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      .star { animation: pulse 2s ease-in-out infinite; filter: url(#glow); }
      .star:nth-child(2) { animation-delay: 0.3s; }
      .star:nth-child(3) { animation-delay: 0.6s; }
      .star:nth-child(4) { animation-delay: 0.9s; }
      .star:nth-child(5) { animation-delay: 1.2s; }
      .star:nth-child(6) { animation-delay: 1.5s; }
      .star:nth-child(7) { animation-delay: 1.8s; }
      .line { stroke: #6366f1; stroke-width: 1.5; stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 2s ease forwards; fill: none; opacity: 0.4; }
      .line:nth-child(8) { animation-delay: 0.2s; }
      .line:nth-child(9) { animation-delay: 0.5s; }
      .line:nth-child(10) { animation-delay: 0.8s; }
      .line:nth-child(11) { animation-delay: 1.1s; }
      .line:nth-child(12) { animation-delay: 1.4s; }
      .line:nth-child(13) { animation-delay: 1.7s; }
      .label { fill: #e8e8f0; font-family: 'Noto Sans SC', system-ui, sans-serif; font-size: 13px; font-weight: 700; text-anchor: middle; }
      .sub { fill: #8888a0; font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-anchor: middle; opacity: 0; animation: fadeIn 0.5s ease forwards; }
      .sub:nth-child(15) { animation-delay: 2.2s; }
      .sub:nth-child(16) { animation-delay: 2.5s; }
      .sub:nth-child(17) { animation-delay: 2.8s; }
      .sub:nth-child(18) { animation-delay: 3.1s; }
      .sub:nth-child(19) { animation-delay: 3.4s; }
      .sub:nth-child(20) { animation-delay: 3.7s; }
      .sub:nth-child(21) { animation-delay: 4.0s; }
      .bg-star { fill: #555570; animation: twinkle 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#0a0a10" rx="12"/>

  <!-- Background stars -->
  <circle cx="50" cy="30" r="1" class="bg-star" style="animation-delay:0.2s"/>
  <circle cx="180" cy="60" r="0.8" class="bg-star" style="animation-delay:1.1s"/>
  <circle cx="350" cy="25" r="1.2" class="bg-star" style="animation-delay:0.7s"/>
  <circle cx="520" cy="45" r="0.6" class="bg-star" style="animation-delay:1.8s"/>
  <circle cx="680" cy="35" r="1" class="bg-star" style="animation-delay:0.4s"/>
  <circle cx="750" cy="70" r="0.8" class="bg-star" style="animation-delay:2.1s"/>
  <circle cx="100" cy="260" r="0.7" class="bg-star" style="animation-delay:1.5s"/>
  <circle cx="400" cy="270" r="1" class="bg-star" style="animation-delay:0.9s"/>
  <circle cx="620" cy="255" r="0.9" class="bg-star" style="animation-delay:2.3s"/>

  <!-- Constellation lines -->
  <line x1="80" y1="140" x2="190" y2="120" class="line"/>
  <line x1="190" y1="120" x2="300" y2="130" class="line"/>
  <line x1="300" y1="130" x2="410" y2="110" class="line"/>
  <line x1="410" y1="110" x2="510" y2="150" class="line"/>
  <line x1="510" y1="150" x2="620" y2="140" class="line"/>
  <line x1="620" y1="140" x2="720" y2="160" class="line"/>

  <!-- 7 Stars of Big Dipper -->
  <circle cx="80" cy="140" r="8" fill="url(#starGrad)" class="star"/>
  <circle cx="190" cy="120" r="7" fill="url(#starGrad)" class="star"/>
  <circle cx="300" cy="130" r="7" fill="url(#starGrad)" class="star"/>
  <circle cx="410" cy="110" r="7" fill="url(#starGrad)" class="star"/>
  <circle cx="510" cy="150" r="8" fill="url(#starGrad)" class="star"/>
  <circle cx="620" cy="140" r="7" fill="url(#starGrad)" class="star"/>
  <circle cx="720" cy="160" r="8" fill="url(#starGrad)" class="star"/>

  <!-- Star labels -->
  <text x="80" y="180" class="label">天枢</text>
  <text x="190" y="165" class="label">天璇</text>
  <text x="300" y="172" class="label">天玑</text>
  <text x="410" y="155" class="label">天权</text>
  <text x="510" y="190" class="label">玉衡</text>
  <text x="620" y="180" class="label">开阳</text>
  <text x="720" y="200" class="label">摇光</text>

  <!-- DSPBRSE labels -->
  <text x="80" y="198" class="sub" style="animation-delay:2.2s">D 发现</text>
  <text x="190" y="183" class="sub" style="animation-delay:2.5s">S 定义</text>
  <text x="300" y="190" class="sub" style="animation-delay:2.8s">P 规划</text>
  <text x="410" y="173" class="sub" style="animation-delay:3.1s">B 构建</text>
  <text x="510" y="208" class="sub" style="animation-delay:3.4s">R 审核</text>
  <text x="620" y="198" class="sub" style="animation-delay:3.7s">S 交付</text>
  <text x="720" y="218" class="sub" style="animation-delay:4.0s">E 进化</text>

  <!-- Title -->
  <text x="400" y="260" fill="#6366f1" font-family="'Noto Sans SC', system-ui" font-size="16" font-weight="700" text-anchor="middle" letter-spacing="4">天 枢 · 北 斗 七 星 导 航 体 系</text>
  <text x="400" y="282" fill="#555570" font-family="'IBM Plex Mono', monospace" font-size="11" text-anchor="middle">DSPBRSE · 7 Phases · AI Engineering Lifecycle</text>
</svg>
