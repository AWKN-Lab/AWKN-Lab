<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', 'Noto Sans SC', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes pulse { 0%,100% { opacity:.6 } 50% { opacity:1 } }
    @keyframes shimmer { 0% { stop-color:#6366f1 } 50% { stop-color:#a855f7 } 100% { stop-color:#6366f1 } }
    @keyframes drawLine { from { stroke-dashoffset:800 } to { stroke-dashoffset:0 } }
    @keyframes scaleIn { from { transform:scale(0.8); opacity:0 } to { transform:scale(1); opacity:1 } }
    .card { animation: fadeUp .8s ease both }
    .card-1 { animation-delay: .2s }
    .card-2 { animation-delay: .4s }
    .card-3 { animation-delay: .6s }
    .title { animation: fadeIn 1s ease both }
    .thesis { animation: scaleIn .8s ease .3s both }
    .line { stroke-dasharray:800; animation: drawLine 2s ease .5s both }
    .star { animation: pulse 3s ease infinite }
  </style>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)" rx="12"/>

  <!-- Decorative background stars -->
  <circle cx="50" cy="30" r="1" fill="#6366f1" opacity=".3" class="star"/>
  <circle cx="750" cy="50" r="1.5" fill="#a855f7" opacity=".2" class="star" style="animation-delay:1s"/>
  <circle cx="120" cy="460" r="1" fill="#6366f1" opacity=".25" class="star" style="animation-delay:2s"/>
  <circle cx="680" cy="440" r="1.2" fill="#a855f7" opacity=".2" class="star" style="animation-delay:.5s"/>

  <!-- ═══ Title: AWKN Origin ═══ -->
  <g class="title">
    <text x="400" y="45" text-anchor="middle" fill="#8b949e" font-size="12" letter-spacing="3">WHO WE ARE</text>
    <!-- AWKN = AWAKEN equation -->
    <text x="400" y="82" text-anchor="middle" fill="url(#accent)" font-size="26" font-weight="700" filter="url(#glow)">
      AWKN = AWAKEN
    </text>
    <text x="400" y="108" text-anchor="middle" fill="#c9d1d9" font-size="14">
      Awakened Decision Intelligence · 觉醒式决策智能
    </text>
  </g>

  <!-- Divider line -->
  <line x1="200" y1="128" x2="600" y2="128" stroke="url(#accent)" stroke-width="1" opacity=".3" class="line"/>

  <!-- ═══ Core Description ═══ -->
  <g class="thesis" style="transform-origin:400px 175px">
    <rect x="80" y="145" width="640" height="65" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="400" y="170" text-anchor="middle" fill="#c9d1d9" font-size="13">
      AI 的力量不在于替代人类，而在于唤醒每个创造者本就具备的决策潜能
    </text>
    <text x="400" y="193" text-anchor="middle" fill="#8b949e" font-size="12">
      我们构建的不是又一个 AI 工具，而是一套让一个人拥有整支团队决策能力的工程方法论
    </text>
  </g>

  <!-- ═══ Thesis Card ═══ -->
  <g class="thesis" style="transform-origin:400px 252px">
    <rect x="180" y="228" width="440" height="48" rx="24" fill="url(#accent)" opacity=".12"/>
    <rect x="180" y="228" width="440" height="48" rx="24" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity=".6"/>
    <text x="400" y="258" text-anchor="middle" fill="#c9d1d9" font-size="18" font-weight="700">
      一个人 + AI 工程方法论 = 一支完整团队
    </text>
  </g>

  <!-- ═══ Key Numbers Row ═══ -->
  <g class="card card-1">
    <text x="160" y="310" text-anchor="middle" fill="url(#accent)" font-size="28" font-weight="700" filter="url(#glow)">82</text>
    <text x="160" y="328" text-anchor="middle" fill="#8b949e" font-size="11">可组合技能</text>
  </g>
  <g class="card card-2">
    <text x="320" y="310" text-anchor="middle" fill="url(#accent)" font-size="28" font-weight="700" filter="url(#glow)">20+</text>
    <text x="320" y="328" text-anchor="middle" fill="#8b949e" font-size="11">产品线</text>
  </g>
  <g class="card card-3">
    <text x="480" y="310" text-anchor="middle" fill="url(#accent)" font-size="28" font-weight="700" filter="url(#glow)">5</text>
    <text x="480" y="328" text-anchor="middle" fill="#8b949e" font-size="11">AI 运行时</text>
  </g>
  <g class="card card-1">
    <text x="640" y="310" text-anchor="middle" fill="url(#accent)" font-size="28" font-weight="700" filter="url(#glow)">500+</text>
    <text x="640" y="328" text-anchor="middle" fill="#8b949e" font-size="11">实战小时</text>
  </g>

  <!-- ═══ Three Beliefs Cards ═══ -->
  <!-- Card 1: 方法论 > 模型 -->
  <g class="card card-1">
    <rect x="40" y="355" width="225" height="108" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="40" y="355" width="225" height="4" rx="2" fill="url(#accent)"/>
    <!-- Icon: gear -->
    <circle cx="68" cy="385" r="14" fill="#6366f1" opacity=".15"/>
    <text x="68" y="390" text-anchor="middle" fill="#6366f1" font-size="16">&#x2699;</text>
    <text x="90" y="389" fill="#c9d1d9" font-size="13" font-weight="600">方法论 &gt; 模型</text>
    <text x="52" y="410" fill="#8b949e" font-size="10.5">模型会迭代、过时、被替代</text>
    <text x="52" y="425" fill="#8b949e" font-size="10.5">工程直觉才是真正的护城河</text>
    <text x="52" y="440" fill="#8b949e" font-size="10.5">DSPBRSE 与具体模型解耦</text>
  </g>

  <!-- Card 2: 实战 > 理论 -->
  <g class="card card-2">
    <rect x="288" y="355" width="225" height="108" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="288" y="355" width="225" height="4" rx="2" fill="url(#gold)"/>
    <circle cx="316" cy="385" r="14" fill="#f59e0b" opacity=".15"/>
    <text x="316" y="390" text-anchor="middle" fill="#f59e0b" font-size="16">&#x26A1;</text>
    <text x="338" y="389" fill="#c9d1d9" font-size="13" font-weight="600">实战 &gt; 理论</text>
    <text x="300" y="410" fill="#8b949e" font-size="10.5">每条规则追溯到具体失败</text>
    <text x="300" y="425" fill="#8b949e" font-size="10.5">17 次返工 → 清晰度门禁</text>
    <text x="300" y="440" fill="#8b949e" font-size="10.5">23 次循环 → 节奏卡牌</text>
  </g>

  <!-- Card 3: 开源 > 闭源 -->
  <g class="card card-3">
    <rect x="536" y="355" width="225" height="108" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="536" y="355" width="225" height="4" rx="2" fill="#10b981"/>
    <circle cx="564" cy="385" r="14" fill="#10b981" opacity=".15"/>
    <text x="564" y="391" text-anchor="middle" fill="#10b981" font-size="16">&#x2661;</text>
    <text x="586" y="389" fill="#c9d1d9" font-size="13" font-weight="600">开源 &gt; 闭源</text>
    <text x="548" y="410" fill="#8b949e" font-size="10.5">方法论不应锁在黑箱</text>
    <text x="548" y="425" fill="#8b949e" font-size="10.5">DSPBRSE 全流程开源</text>
    <text x="548" y="440" fill="#8b949e" font-size="10.5">一套核心，五个运行时共享</text>
  </g>

</svg>
