<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI', 'Noto Sans SC', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="star-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
    @keyframes pulse { 0%,100% { r:5; opacity:.7 } 50% { r:7; opacity:1 } }
    @keyframes flowDash { from { stroke-dashoffset:24 } to { stroke-dashoffset:0 } }
    @keyframes glowPulse { 0%,100% { opacity:.4 } 50% { opacity:.8 } }
    .stage { animation: fadeUp .6s ease both }
    .s0 { animation-delay:.1s } .s1 { animation-delay:.2s } .s2 { animation-delay:.3s }
    .s3 { animation-delay:.4s } .s4 { animation-delay:.5s } .s5 { animation-delay:.6s }
    .s6 { animation-delay:.7s }
    .flow-line { stroke-dasharray:8 4; animation: flowDash 1s linear infinite }
    .star-dot { animation: pulse 3s ease infinite }
    .glow-ring { animation: glowPulse 3s ease infinite }
    .title { animation: fadeIn .8s ease both }
    .footer { animation: fadeIn 1s ease .8s both }
  </style>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <g class="title">
    <text x="400" y="38" text-anchor="middle" fill="#8b949e" font-size="11" letter-spacing="3">DSPBRSE · 北斗七星导航体系</text>
    <text x="400" y="62" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="600">
      斗转星移，枢纽不动 — 七颗星辰照亮的工程治理闭环
    </text>
  </g>

  <!-- ═══ Pipeline Flow ═══ -->
  <!-- Main flow line -->
  <line x1="60" y1="130" x2="740" y2="130" stroke="#30363d" stroke-width="2"/>
  <line x1="60" y1="130" x2="740" y2="130" stroke="url(#flow)" stroke-width="2" class="flow-line" opacity=".6"/>

  <!-- Stage 1: D - Discover -->
  <g class="stage s0">
    <circle cx="97" cy="130" r="22" fill="#0d1117" stroke="#6366f1" stroke-width="2"/>
    <circle cx="97" cy="130" class="glow-ring" r="22" fill="none" stroke="#6366f1" stroke-width="1" opacity=".4"/>
    <text x="97" y="125" text-anchor="middle" fill="#6366f1" font-size="10" font-weight="700">D</text>
    <text x="97" y="138" text-anchor="middle" fill="#6366f1" font-size="8">发现</text>
    <!-- Star label -->
    <text x="97" y="100" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">&#x2605; 天枢</text>
    <!-- Details card below -->
    <rect x="32" y="165" width="130" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="97" y="182" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">枢纽之眼</text>
    <text x="97" y="198" text-anchor="middle" fill="#8b949e" font-size="9.5">PRD 生成</text>
    <text x="97" y="212" text-anchor="middle" fill="#8b949e" font-size="9.5">用户洞察</text>
    <text x="97" y="226" text-anchor="middle" fill="#8b949e" font-size="9.5">竞品分析</text>
    <rect x="72" y="232" width="50" height="16" rx="8" fill="#6366f1" opacity=".15"/>
    <text x="97" y="244" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="600">v2.1</text>
  </g>

  <!-- Stage 2: S - Specify -->
  <g class="stage s1">
    <circle cx="195" cy="130" r="22" fill="#0d1117" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="195" cy="130" class="glow-ring" r="22" fill="none" stroke="#7c3aed" stroke-width="1" opacity=".4" style="animation-delay:.5s"/>
    <text x="195" y="125" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="700">S</text>
    <text x="195" y="138" text-anchor="middle" fill="#7c3aed" font-size="8">定义</text>
    <text x="195" y="100" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">&#x2605; 天璇</text>
    <rect x="130" y="165" width="130" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="195" y="182" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">琢玉成形</text>
    <text x="195" y="198" text-anchor="middle" fill="#8b949e" font-size="9.5">需求冻结</text>
    <text x="195" y="212" text-anchor="middle" fill="#8b949e" font-size="9.5">验收标准</text>
    <text x="195" y="226" text-anchor="middle" fill="#8b949e" font-size="9.5">Delta Spec</text>
    <rect x="170" y="232" width="50" height="16" rx="8" fill="#7c3aed" opacity=".15"/>
    <text x="195" y="244" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">v1.0</text>
  </g>

  <!-- Stage 3: P - Plan -->
  <g class="stage s2">
    <circle cx="293" cy="130" r="22" fill="#0d1117" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="293" cy="130" class="glow-ring" r="22" fill="none" stroke="#8b5cf6" stroke-width="1" opacity=".4" style="animation-delay:1s"/>
    <text x="293" y="125" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="700">P</text>
    <text x="293" y="138" text-anchor="middle" fill="#8b5cf6" font-size="8">规划</text>
    <text x="293" y="100" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">&#x2605; 天玑</text>
    <rect x="228" y="165" width="130" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="293" y="182" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">运筹帷幄</text>
    <text x="293" y="198" text-anchor="middle" fill="#8b949e" font-size="9.5">方案设计</text>
    <text x="293" y="212" text-anchor="middle" fill="#8b949e" font-size="9.5">风险评估</text>
    <text x="293" y="226" text-anchor="middle" fill="#8b949e" font-size="9.5">资源规划</text>
    <rect x="268" y="232" width="50" height="16" rx="8" fill="#8b5cf6" opacity=".15"/>
    <text x="293" y="244" text-anchor="middle" fill="#8b5cf6" font-size="9" font-weight="600">v2.1</text>
  </g>

  <!-- Stage 4: B - Build -->
  <g class="stage s3">
    <circle cx="391" cy="130" r="22" fill="#0d1117" stroke="#a855f7" stroke-width="2"/>
    <circle cx="391" cy="130" class="glow-ring" r="22" fill="none" stroke="#a855f7" stroke-width="1" opacity=".4" style="animation-delay:1.5s"/>
    <text x="391" y="125" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="700">B</text>
    <text x="391" y="138" text-anchor="middle" fill="#a855f7" font-size="8">构建</text>
    <text x="391" y="100" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">&#x2605; 天权</text>
    <rect x="326" y="165" width="130" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="391" y="182" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">执权落子</text>
    <text x="391" y="198" text-anchor="middle" fill="#8b949e" font-size="9.5">工程师</text>
    <text x="391" y="212" text-anchor="middle" fill="#8b949e" font-size="9.5">工程文档</text>
    <text x="391" y="226" text-anchor="middle" fill="#8b949e" font-size="9.5">执行检查</text>
    <rect x="366" y="232" width="50" height="16" rx="8" fill="#a855f7" opacity=".15"/>
    <text x="391" y="244" text-anchor="middle" fill="#a855f7" font-size="9" font-weight="600">v2.8</text>
  </g>

  <!-- Stage 5: R - Review -->
  <g class="stage s4">
    <circle cx="489" cy="130" r="22" fill="#0d1117" stroke="#c084fc" stroke-width="2"/>
    <circle cx="489" cy="130" class="glow-ring" r="22" fill="none" stroke="#c084fc" stroke-width="1" opacity=".4" style="animation-delay:2s"/>
    <text x="489" y="125" text-anchor="middle" fill="#c084fc" font-size="10" font-weight="700">R</text>
    <text x="489" y="138" text-anchor="middle" fill="#c084fc" font-size="8">审核</text>
    <text x="489" y="100" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">&#x2605; 玉衡</text>
    <rect x="424" y="165" width="130" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="489" y="182" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">执衡明断</text>
    <text x="489" y="198" text-anchor="middle" fill="#8b949e" font-size="9.5">代码审核</text>
    <text x="489" y="212" text-anchor="middle" fill="#8b949e" font-size="9.5">安全扫描</text>
    <text x="489" y="226" text-anchor="middle" fill="#8b949e" font-size="9.5">AI 审核</text>
    <rect x="464" y="232" width="50" height="16" rx="8" fill="#c084fc" opacity=".15"/>
    <text x="489" y="244" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="600">v4.1</text>
  </g>

  <!-- Stage 6: S - Ship -->
  <g class="stage s5">
    <circle cx="587" cy="130" r="22" fill="#0d1117" stroke="#e879f9" stroke-width="2"/>
    <circle cx="587" cy="130" class="glow-ring" r="22" fill="none" stroke="#e879f9" stroke-width="1" opacity=".4" style="animation-delay:2.5s"/>
    <text x="587" y="125" text-anchor="middle" fill="#e879f9" font-size="10" font-weight="700">S</text>
    <text x="587" y="138" text-anchor="middle" fill="#e879f9" font-size="8">交付</text>
    <text x="587" y="100" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">&#x2605; 开阳</text>
    <rect x="522" y="165" width="130" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="587" y="182" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">破晓出关</text>
    <text x="587" y="198" text-anchor="middle" fill="#8b949e" font-size="9.5">CI/CD 流水线</text>
    <text x="587" y="212" text-anchor="middle" fill="#8b949e" font-size="9.5">部署</text>
    <text x="587" y="226" text-anchor="middle" fill="#8b949e" font-size="9.5">灰度发布</text>
    <rect x="562" y="232" width="50" height="16" rx="8" fill="#e879f9" opacity=".15"/>
    <text x="587" y="244" text-anchor="middle" fill="#e879f9" font-size="9" font-weight="600">v2.11</text>
  </g>

  <!-- Stage 7: E - Evolve -->
  <g class="stage s6">
    <circle cx="685" cy="130" r="22" fill="#0d1117" stroke="#f0abfc" stroke-width="2"/>
    <circle cx="685" cy="130" class="glow-ring" r="22" fill="none" stroke="#f0abfc" stroke-width="1" opacity=".4" style="animation-delay:3s"/>
    <text x="685" y="125" text-anchor="middle" fill="#f0abfc" font-size="10" font-weight="700">E</text>
    <text x="685" y="138" text-anchor="middle" fill="#f0abfc" font-size="8">进化</text>
    <text x="685" y="100" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">&#x2605; 摇光</text>
    <rect x="620" y="165" width="130" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="685" y="182" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">星光永续</text>
    <text x="685" y="198" text-anchor="middle" fill="#8b949e" font-size="9.5">复盘总结</text>
    <text x="685" y="212" text-anchor="middle" fill="#8b949e" font-size="9.5">技能进化</text>
    <text x="685" y="226" text-anchor="middle" fill="#8b949e" font-size="9.5">经验沉淀</text>
    <rect x="660" y="232" width="50" height="16" rx="8" fill="#f0abfc" opacity=".15"/>
    <text x="685" y="244" text-anchor="middle" fill="#f0abfc" font-size="9" font-weight="600">v3.2</text>
  </g>

  <!-- ═══ Five Integration Mechanisms ═══ -->
  <g class="footer">
    <rect x="40" y="270" width="720" height="1" fill="#30363d" opacity=".5"/>
    <text x="400" y="300" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">五大融合机制</text>

    <!-- Mechanism pills -->
    <rect x="62" y="318" width="118" height="30" rx="15" fill="#161b22" stroke="#6366f1" stroke-width="1" opacity=".8"/>
    <text x="121" y="337" text-anchor="middle" fill="#c9d1d9" font-size="10.5">项目宪法</text>

    <rect x="196" y="318" width="118" height="30" rx="15" fill="#161b22" stroke="#7c3aed" stroke-width="1" opacity=".8"/>
    <text x="255" y="337" text-anchor="middle" fill="#c9d1d9" font-size="10.5">Delta Spec</text>

    <rect x="330" y="318" width="118" height="30" rx="15" fill="#161b22" stroke="#8b5cf6" stroke-width="1" opacity=".8"/>
    <text x="389" y="337" text-anchor="middle" fill="#c9d1d9" font-size="10.5">工程铁律</text>

    <rect x="464" y="318" width="118" height="30" rx="15" fill="#161b22" stroke="#a855f7" stroke-width="1" opacity=".8"/>
    <text x="523" y="337" text-anchor="middle" fill="#c9d1d9" font-size="10.5">四维质量体系</text>

    <rect x="598" y="318" width="148" height="30" rx="15" fill="#161b22" stroke="#c084fc" stroke-width="1" opacity=".8"/>
    <text x="672" y="337" text-anchor="middle" fill="#c9d1d9" font-size="10.5">认知框架</text>

    <!-- Sub-label for cognitive framework -->
    <text x="672" y="362" text-anchor="middle" fill="#8b949e" font-size="9">清晰度门禁 + 节奏卡牌</text>

    <!-- Link -->
    <text x="400" y="400" text-anchor="middle" fill="#6366f1" font-size="12">
      &#x2192; github.com/awkn-lab/tianshu
    </text>
  </g>

</svg>
